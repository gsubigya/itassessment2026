<h2 align="center">Exercise 2</h2>

<div style="width:400px; border:2px solid black; padding:20px;"> 

    
<h2>HTML Form Test</h2> 

<form> 
    <div>
        <label> Name</label> <input type="text" id="name" required> 
    </div><br>

    <div> 
        <label> Address</label> <input type="text" id="address" required>
    </div><br>

</form>
