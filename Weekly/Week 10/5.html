<!DOCTYPE html>
<html>
    <head>
        <title>For Loop Images</title>
    </head>
    <body>
        <script>
            for (let i = 1; i <= 4; i++) {
                // document.write("<img src='" + i + ".jpg' alt='Image " + i + "'>");
                document.write("<img src='" + i + ".jpg' width='200' height='200' alt='Image " + i + "'>");
            }
        </script>
    </body>
</html>
