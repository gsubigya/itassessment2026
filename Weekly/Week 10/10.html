<!DOCTYPE html>
<html>
<head>
    <title>Rectangle Area</title>
</head>
<body>

<p id="result"></p>

<script>
// function to calculate area
function calculateArea(length, breadth) {
    return length * breadth;
}

let area = calculateArea(5, 3); // example values

// displaying result
document.getElementById("result").innerHTML = "Area = " + area;
</script>

</body>
</html>
