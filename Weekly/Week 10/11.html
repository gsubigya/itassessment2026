<!DOCTYPE html>
<html>
<head>
    <title>Add and Display | Clear</title>
</head>
<body>

<h2>Add Items to Array</h2>

<input type="text" id="text1">
<input type="button" value="Add" onclick="add_item_to_array()">
<input type="button" value="Display" onclick="display_array()">
<input type="button" value="Clear" onclick="location.reload()">

<div id="Result"></div>

<script>
// Create empty array and index
var array = [];
var x = 0;

// Function to add item
function add_item_to_array() {
    array[x] = document.getElementById("text1").value;
    alert("Element: " + array[x] + " Added at index " + x);
    x++;
    document.getElementById("text1").value = "";
}

// Function to display array
function display_array() {
    var e = "<hr/>";
    for (var y = 0; y < array.length; y++) {
        e += "Element " + y + " = " + array[y] + "<br/>";
    }
    document.getElementById("Result").innerHTML = e;
}
</script>

</body>
</html>
