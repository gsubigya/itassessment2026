<!DOCTYPE html>
<html>
<head>
    <title>Input and Alert Example</title>
</head>
<body>

<script>
    // Take input from user
    let name = prompt("Enter your name:");
    let studentId = prompt("Enter your Student ID:");

    // Display output using alert
    alert("Your Name: " + name + "\nYour Student ID: " + studentId);
</script>

</body>
</html>
