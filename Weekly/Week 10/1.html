<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Data Types Example</title>
</head>
<body>

<script>
    // Numeric (Integer)
    let num = 10;

    // Float (Decimal number)
    let floatNum = 5.75;

    // String
    let text = "Hello, JavaScript!";

    // Boolean
    let isTrue = true;

    // Display values using document.write()
    document.write("<h2>Displaying Different Data Types</h2>");
    document.write("Integer Value: " + num + "<br>");
    document.write("Float Value: " + floatNum + "<br>");
    document.write("String Value: " + text + "<br>");
    document.write("Boolean Value: " + isTrue + "<br>");
</script>

</body>
</html>
